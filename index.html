<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MURPH MENU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>MURPH</h1></header>

<div class="main-nav-container">
    <div class="main-nav">
        <button id="main-btn-food" class="main-nav-btn active" onclick="switchMain('food')">Еда</button>
        <button id="main-btn-drinks" class="main-nav-btn" onclick="switchMain('drinks')">Напитки</button>
    </div>
</div>

<div id="sub-food" class="sub-nav-container active">
    <div class="sub-nav">
        <button class="sub-nav-btn active" onclick="go('breakfast')">Завтраки</button>
        <button class="sub-nav-btn" onclick="go('salads')">Салаты</button>
        <button class="sub-nav-btn" onclick="go('pizza')">Пицца</button>
        <button class="sub-nav-btn" onclick="go('pasta')">Горячее</button>
        <button class="sub-nav-btn" onclick="go('sweets')">Сладкое</button>
        <button class="sub-nav-btn" onclick="go('constructor')">Допы</button>
    </div>
</div>

<div id="sub-drinks" class="sub-nav-container">
    <div class="sub-nav">
        <button class="sub-nav-btn active" onclick="go('coffee')">Кофе</button>
        <button class="sub-nav-btn" onclick="go('tea')">Чай</button>
        <button class="sub-nav-btn" onclick="go('matcha')">Матча</button>
        <button class="sub-nav-btn" onclick="go('special')">Special</button>
    </div>
</div>

<div id="view-food" class="menu-view active">
    <section id="breakfast" class="category-section">
        <div class="category-header">Завтраки (весь день)</div>
        <div class="item">
            <div class="item-photo"><img data-img="grechka" src="" alt=""></div>
            <div class="item-info">
                <div class="item-title-row"><p class="item-name">Зелёная гречка, горошек, пармезан</p><span class="item-price">490</span></div>
            </div>
        </div>
        <div class="item">
            <div class="item-photo"><img data-img="shakshuka" src="" alt=""></div>
            <div class="item-info">
                <div class="item-title-row"><p class="item-name">Пряная шакшука, копчёная фета, яйца пашот</p><span class="item-price">690</span></div>
            </div>
        </div>
    </section>

    <section id="pizza" class="category-section">
        <div class="category-header">Пицца</div>
        <div class="item">
            <div class="item-photo"><img data-img="pepperoni" src="" alt=""></div>
            <div class="item-info">
                <div class="item-title-row"><p class="item-name">Пицца Пепперони</p><span class="item-price">850</span></div>
            </div>
        </div>
    </section>

    <section id="pasta" class="category-section">
        <div class="category-header">Горячее</div>
        <div class="item">
            <div class="item-photo"><img data-img="lasagna" src="" alt=""></div>
            <div class="item-info">
                <div class="item-title-row"><p class="item-name">Лазанья с уткой</p><span class="item-price">899</span></div>
            </div>
        </div>
    </section>
</div>

<div id="view-drinks" class="menu-view">
    <section id="coffee" class="category-section">
        <div class="category-header">Кофе</div>
        <div class="item">
            <div class="item-photo"><img data-img="capuchino" src="" alt=""></div>
            <div class="item-info">
                <div class="item-title-row"><p class="item-name">Капучино <span class="vol">200/300 мл</span></p><span class="item-price">350/420</span></div>
            </div>
        </div>
    </section>
</div>

<div id="photo-overlay" onclick="closePhoto()">
    <img id="full-photo" src="" alt="">
    <div class="close-btn">&times;</div>
</div>

<footer>
    <p>*Все молочные напитки на безлактозном молоке</p>
    <p>murph.coffee</p>
</footer>

<script src="images.js"></script>
<script>
    function switchMain(type) {
        document.querySelectorAll('.menu-view, .sub-nav-container, .main-nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + type).classList.add('active');
        document.getElementById('sub-' + type).classList.add('active');
        document.getElementById('main-btn-' + type).classList.add('active');
        window.scrollTo(0,0);
    }
    function go(id) {
        const section = document.getElementById(id);
        if (section) window.scrollTo({ top: section.offsetTop - 120, behavior: 'smooth' });
    }
</script>
</body>
</html>
